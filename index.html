<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casamento V & G</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="coracao" aria-hidden="true"></div>
    <div class="telaPrincipal">
        
        
        <div class="fotoCasal">
            <img src="images/casal1.png" alt="Foto do Casal">
        </div>

        <div class="conteudoDireito">
            
            <div class="blocoConteudo">
                
                <img class="coracaoCentro" src="images/CoracaoVeG.png" alt="Logo V e G">

                <div class="divCima">
                    <div class="fraseCoracao">
                        <img src="images/coracao.png" alt="Ícone coração">
                        <h4>Sua presença já é o nosso maior presente!</h4>
                    </div>
                </div>

                <div class="quadradoLogin">
                    <div class="Login">
                        <img src="images/coracaoRisc.png" class="decoracaoCima" alt="Coração decorativo">
                        <h3>Bem-vindo!</h3>
                        <h5>Estamos muito felizes em compartilhar esse momento especial com você.</h5>
                        
                        <img src="images/linhacoracao1.png" class="divCoracao" alt="Div">
                        
                        <label for="nome-usuario">Para começar, diga seu nome:</label>
                        <input type="text" id="nome-usuario" placeholder="Digite seu nome" required>
                        
                        <a href="subpages/opcao.html" class="botaoComecar">Começar</a>
                    </div>
                </div>

            </div> 
        </div>

        <div class="flores">
            <img src="images/flor.png" alt="Flores decorativas">
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
