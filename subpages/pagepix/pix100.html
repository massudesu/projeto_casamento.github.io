<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribuição Pix - Vitor & Guilherme</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pix.css">
</head>
<body>

    <div class="containerLuaDeMel">
        
        <div class="headerBanner">
            <img src="../../images/paisagem.png" alt="Alpes Suíços" class="fotoPaisagem">
            <div class="logoMontanha">
                <img src="../../images/montanha.png" alt="Logo">
            </div>
        </div>

        <div class="conteudoViagem telaQrCode">
            
            <div class="decoracaoMeio">
                <img src="../../images/aviao.png" alt="Decoração" class="linhaAviao">
            </div>

            <h1>Nossa Lua de Mel nos <span class="destaque">Alpes Suíços <span class="bandeira">🇨🇭</span></span></h1>
            <p class="descricao">
                Seu carinho também pode nos ajudar a viver esse sonho inesquecível!<br>
                Estamos arrecadando contribuições para nossa lua de mel nos Alpes Suíços.
            </p>

            <div class="blocoQrCode">
                <div class="molduraQrCode">
                    <img src="../../images/cem.jpeg" alt="QR Code Pix R$ 100" class="qrcodeImg">
                </div>
                
                <div class="exibicaoValorFinal">
                    R$ 100,00
                </div>
            </div>

            <a href="../luademel.html" class="btnVoltar">Voltar para a lista</a>
        </div>

        <div class="folhasDecorativas" aria-hidden="true">
            <img src="../../images/flor.png" alt="Folhas">
        </div>
    </div>

    <script src="../luademel.js"></script>
</body>
</html>
